<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>재고 관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#B8860B;--gold-light:#D4A843;--gold-pale:#FDF6E3;--gold-border:#E8D5A3;
  --bg:#FAFAF8;--panel:#FFFFFF;--surface:#F5F3EE;
  --text:#1A1714;--text2:#6B6560;--text3:#9B9590;
  --border:#E8E4DC;--border2:#D4CEC4;
  --red:#C0392B;--green:#27AE60;--radius:12px;--radius-sm:8px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Setup */
.setup-screen{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px}
.setup-logo{text-align:center;margin-bottom:32px}
.setup-logo .logo-mark{width:56px;height:56px;background:var(--gold);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
.setup-logo .logo-mark svg{width:28px;height:28px;fill:#fff}
.setup-logo h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.setup-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.setup-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.setup-card h2{font-size:15px;font-weight:700;margin-bottom:6px}
.setup-card .desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:0.3px}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;
  transition:border-color .2s;outline:none
}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-group textarea{height:64px;resize:none;line-height:1.5}
.btn-primary{
  width:100%;padding:12px;background:var(--gold);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  transition:background .2s,transform .1s;letter-spacing:0.3px
}
.btn-primary:hover{background:var(--gold-light)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{background:#C4BAA8;cursor:not-allowed}
.connect-status{font-size:12px;margin-top:10px;text-align:center;min-height:16px;font-weight:500}
.s-ok{color:var(--green)}.s-err{color:var(--red)}.s-loading{color:var(--text2)}

/* Nav */
.nav-bar{
  display:flex;background:var(--panel);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50
}
.nav-btn{
  flex:1;padding:14px 4px 12px;font-size:12px;font-weight:500;border:none;background:transparent;
  cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);
  font-family:'Noto Sans KR',sans-serif;transition:all .2s;letter-spacing:0.3px
}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Views */
.view{display:none;padding:20px;flex:1}
.view.active{display:block}
.page-title{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:-0.3px}

/* Product form */
.img-hint{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}
.btn-reg{
  width:100%;padding:13px;background:var(--gold);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  margin-top:4px;transition:background .2s,transform .1s
}
.btn-reg:hover{background:var(--gold-light)}
.btn-reg:active{transform:scale(0.98)}
.btn-reg:disabled{background:#C4BAA8;cursor:not-allowed}
.settings-link{
  font-size:12px;color:var(--text3);text-align:center;margin-top:14px;
  cursor:pointer;text-decoration:underline;text-underline-offset:2px
}

/* List */
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.check-all{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.toolbar label{font-size:13px;color:var(--text2);cursor:pointer}
.toolbar-right{display:flex;gap:6px;margin-left:auto;align-items:center}
.btn-sm{
  padding:6px 12px;font-size:12px;font-weight:500;border:1px solid var(--border2);
  border-radius:var(--radius-sm);background:var(--panel);cursor:pointer;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;transition:background .15s
}
.btn-sm:hover{background:var(--surface)}
.sel-count{font-size:12px;color:var(--text2);white-space:nowrap}

.adjust-panel{
  background:var(--gold-pale);border:1px solid var(--gold-border);
  border-radius:var(--radius);padding:14px;margin-bottom:12px
}
.adjust-panel h3{font-size:13px;font-weight:700;color:#7A5C0A;margin-bottom:10px}
.adjust-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.adjust-row select,.adjust-row input[type=number]{
  padding:8px 10px;border:1px solid var(--gold-border);border-radius:var(--radius-sm);
  background:#fff;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none
}
.adjust-row select{flex:1}
.adjust-row input[type=number]{width:72px}
.btn-adjust{
  padding:8px 16px;background:var(--gold);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif
}

.product-item{
  display:flex;align-items:center;gap:12px;padding:12px;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--panel);margin-bottom:8px;transition:border-color .2s
}
.product-item:hover{border-color:var(--border2)}
.p-check{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
.p-thumb{
  width:52px;height:52px;border-radius:var(--radius-sm);flex-shrink:0;
  overflow:hidden;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;font-size:22px
}
.p-thumb img{width:100%;height:100%;object-fit:cover}
.p-info{flex:1;min-width:0;cursor:pointer}
.p-model{font-size:14px;font-weight:700;letter-spacing:-0.2px}
.p-sku{font-size:11px;color:var(--text3);margin-top:1px;font-family:monospace}
.p-price{font-size:13px;font-weight:700;color:var(--gold);margin-top:2px}
.p-note{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.btn-edit{padding:5px 10px;font-size:11px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);cursor:pointer;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.btn-del{padding:5px 10px;font-size:11px;border:1px solid #F5C6C6;border-radius:6px;background:transparent;cursor:pointer;color:var(--red);font-family:'Noto Sans KR',sans-serif}

.empty-state,.loading-state{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}

/* Lookup */
.lookup-wrap{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.lookup-hint{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
.lookup-row{display:flex;gap:8px}
.lookup-row input{
  flex:1;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  background:var(--panel);font-size:15px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none
}
.lookup-row input:focus{border-color:var(--gold)}
.btn-lookup{
  padding:11px 16px;background:var(--gold);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif
}

.result-card{border:1px solid var(--border);border-radius:var(--radius);background:var(--panel);overflow:hidden;margin-bottom:16px}
.result-img{width:100%;height:200px;object-fit:cover;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;font-size:56px}
.result-img img{width:100%;height:100%;object-fit:cover}
.result-body{padding:16px}
.result-model{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.result-price{font-size:30px;font-weight:700;color:var(--gold);margin-top:4px;letter-spacing:-1px}
.result-note{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6}
.result-updated{font-size:11px;color:var(--text3);margin-top:10px}
.not-found{text-align:center;padding:32px;color:var(--text2);font-size:14px}

.recent-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;letter-spacing:0.3px}

/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:none;align-items:flex-end;justify-content:center
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel);border-radius:20px 20px 0 0;padding:24px;
  width:100%;max-width:480px;max-height:85vh;overflow-y:auto
}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;letter-spacing:-0.3px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);margin-top:-2px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row .lbl{color:var(--text2)}
.detail-row .val{font-weight:500;text-align:right;max-width:60%}
.sku-val{font-family:monospace;font-size:12px;color:#C07020;background:#FFF3E0;padding:2px 8px;border-radius:4px}
.price-val{color:var(--gold);font-size:16px;font-weight:700}
.barcode-area{
  border:1px dashed var(--border2);border-radius:var(--radius-sm);
  padding:14px;text-align:center;margin-top:12px;cursor:pointer;transition:background .2s
}
.barcode-area:hover{background:var(--surface)}
.barcode-lines{font-family:monospace;font-size:13px;letter-spacing:2px;color:var(--text2)}
.barcode-label{font-size:11px;color:var(--text3);margin-top:4px}
.modal-actions{display:flex;gap:8px;margin-top:14px}
.modal-actions button{flex:1;padding:10px;font-size:13px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;color:var(--text);font-family:'Noto Sans KR',sans-serif}
.modal-actions button:hover{background:var(--border)}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1A1714;color:#fff;padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;font-family:'Noto Sans KR',sans-serif
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <!-- 설정 화면 -->
  <div class="setup-screen" id="setup-screen">
    <div class="setup-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <h1>재고 관리</h1>
      <p>Google Sheets 연동 재고 관리 시스템</p>
    </div>
    <div class="setup-card">
      <h2>연결 설정</h2>
      <p class="desc">Apps Script URL과 보안 키를 입력하면 Google Sheets와 연동됩니다. 한 번만 입력하면 저장됩니다.</p>
      <div class="form-group">
        <label>Apps Script URL</label>
        <input type="url" id="inp-url" placeholder="https://script.google.com/macros/s/.../exec" />
      </div>
      <div class="form-group">
        <label>보안 키</label>
        <input type="password" id="inp-key" placeholder="설정한 비밀번호 입력" />
      </div>
      <button class="btn-primary" onclick="tryConnect()">연결 테스트</button>
      <div class="connect-status" id="connect-status"></div>
    </div>
  </div>

  <!-- 메인 화면 -->
  <div id="main-screen" style="display:none;flex-direction:column;flex:1">
    <div class="nav-bar">
      <button class="nav-btn active" onclick="switchNav('add')">제품 등록</button>
      <button class="nav-btn" onclick="switchNav('list')">재고 목록</button>
      <button class="nav-btn" onclick="switchNav('lookup')">고객 조회</button>
    </div>

    <!-- 제품 등록 -->
    <div class="view active" id="view-add">
      <p class="page-title">새 제품 등록</p>
      <div class="form-group">
        <label>모델번호 (고객 공개)</label>
        <input type="text" id="inp-model" placeholder="예: RG-24K-001" />
      </div>
      <div class="form-group">
        <label>고유 관리번호 (판매자 전용)</label>
        <input type="text" id="inp-sku" placeholder="예: SKU-2024-0001" />
      </div>
      <div class="form-group">
        <label>판매 가격 (₩)</label>
        <input type="number" id="inp-price" placeholder="예: 450000" />
      </div>
      <div class="form-group">
        <label>제품 사진 — OneDrive 공유 링크</label>
        <input type="url" id="inp-img" placeholder="OneDrive 공유 링크 붙여넣기" />
        <p class="img-hint">OneDrive에서 사진 선택 → 공유 → 링크 복사 → 여기에 붙여넣기</p>
      </div>
      <div class="form-group">
        <label>특이사항 / 메모</label>
        <textarea id="inp-note" placeholder="예: 18K 골드, 다이아몬드 0.3ct, 사이즈 13호..."></textarea>
      </div>
      <button class="btn-reg" id="btn-add" onclick="addProduct()">제품 등록하기</button>
      <p class="settings-link" onclick="showSetup()">⚙ 연결 설정 변경</p>
    </div>

    <!-- 재고 목록 -->
    <div class="view" id="view-list">
      <p class="page-title">재고 목록</p>
      <div class="adjust-panel" id="adjust-panel" style="display:none">
        <h3>가격 일괄 조정</h3>
        <div class="adjust-row">
          <select id="adj-type">
            <option value="pct-up">% 인상</option>
            <option value="pct-down">% 인하</option>
            <option value="fixed-up">금액 인상 (₩)</option>
            <option value="fixed-down">금액 인하 (₩)</option>
          </select>
          <input type="number" id="adj-val" value="10" min="0" step="1" />
          <button class="btn-adjust" onclick="applyAdjust()">적용</button>
        </div>
      </div>
      <div class="toolbar">
        <input type="checkbox" class="check-all" id="sel-all" onchange="selectAll(this)" />
        <label for="sel-all">전체 선택</label>
        <div class="toolbar-right">
          <button class="btn-sm" onclick="toggleAdjust()" id="adj-toggle">가격 조정</button>
          <button class="btn-sm" onclick="loadProducts()">↺ 새로고침</button>
          <span class="sel-count" id="sel-count">0개 선택</span>
        </div>
      </div>
      <div id="product-list"><div class="loading-state"><div class="empty-icon">⏳</div>불러오는 중...</div></div>
    </div>

    <!-- 고객 조회 -->
    <div class="view" id="view-lookup">
      <p class="page-title">제품 조회</p>
      <div class="lookup-wrap">
        <p class="lookup-hint">모델번호를 입력하면 가격과 사진이 표시됩니다.<br>고객이 직접 조회할 수 있습니다.</p>
        <div class="lookup-row">
          <input type="text" id="lookup-inp" placeholder="모델번호 입력..." onkeydown="if(event.key==='Enter')doLookup()" />
          <button class="btn-lookup" onclick="doLookup()">조회</button>
        </div>
      </div>
      <div id="lookup-result"></div>
      <p class="recent-title">최근 등록 제품</p>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <p class="modal-title" id="modal-title"></p>
      <div id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
let cfg = JSON.parse(localStorage.getItem('jw_cfg2')||'{}');
let products = [];
let adjVisible = false;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function api(params){
  const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v||'')).join('&');
  const url=cfg.url+'?key='+encodeURIComponent(cfg.key)+'&'+qs;
  return fetch(url).then(r=>r.json());
}

function tryConnect(){
  const url=document.getElementById('inp-url').value.trim();
  const key=document.getElementById('inp-key').value.trim();
  const st=document.getElementById('connect-status');
  if(!url||!key){st.className='connect-status s-err';st.textContent='URL과 보안 키를 모두 입력하세요';return;}
  st.className='connect-status s-loading';st.textContent='연결 테스트 중...';
  fetch(url+'?key='+encodeURIComponent(key)+'&action=getAll')
    .then(r=>r.json()).then(data=>{
      if(data.status==='ok'){
        cfg={url,key};
        localStorage.setItem('jw_cfg2',JSON.stringify(cfg));
        st.className='connect-status s-ok';st.textContent='✓ 연결 성공!';
        setTimeout(()=>{
          document.getElementById('setup-screen').style.display='none';
          const ms=document.getElementById('main-screen');
          ms.style.display='flex';ms.style.flexDirection='column';
          loadProducts();
        },700);
      } else {
        st.className='connect-status s-err';st.textContent='오류: '+(data.message||'알 수 없는 오류');
      }
    }).catch(e=>{
      st.className='connect-status s-err';st.textContent='연결 실패. URL을 확인해 주세요.';
    });
}

function showSetup(){
  document.getElementById('setup-screen').style.display='flex';
  document.getElementById('main-screen').style.display='none';
  if(cfg.url)document.getElementById('inp-url').value=cfg.url;
}

function switchNav(v){
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['add','list','lookup'][i]===v));
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(v==='list')loadProducts();
  if(v==='lookup')renderRecent();
}

function loadProducts(){
  const el=document.getElementById('product-list');
  el.innerHTML='<div class="loading-state"><div class="empty-icon">⏳</div>불러오는 중...</div>';
  api({action:'getAll'}).then(data=>{
    if(data.status==='ok'){
      products=data.data.filter(p=>p.id).map(p=>({...p,selected:false}));
      renderList();
    }
  }).catch(()=>{
    el.innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div>불러오기 실패. 새로고침 해주세요.</div>';
  });
}

function renderList(){
  const el=document.getElementById('product-list');
  if(!products.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">💍</div>등록된 제품이 없습니다</div>';
    return;
  }
  el.innerHTML=products.map(p=>`
    <div class="product-item">
      <input type="checkbox" class="p-check" ${p.selected?'checked':''} onchange="toggleSel('${p.id}',this)" />
      <div class="p-thumb">${p.img?`<img src="${p.img}" alt="" onerror="this.parentElement.innerHTML='💍'">`:'💍'}</div>
      <div class="p-info" onclick="openDetail('${p.id}')">
        <div class="p-model">${p.model}</div>
        <div class="p-sku">${p.sku}</div>
        <div class="p-price">₩${Number(p.price).toLocaleString()}</div>
        ${p.note?`<div class="p-note">${p.note}</div>`:''}
      </div>
      <div class="p-actions">
        <button class="btn-edit" onclick="openDetail('${p.id}')">상세</button>
        <button class="btn-del" onclick="deleteProduct('${p.id}')">삭제</button>
      </div>
    </div>
  `).join('');
  updateSelCount();
}

function toggleSel(id,cb){
  const p=products.find(x=>x.id===id);
  if(p)p.selected=cb.checked;
  updateSelCount();
}

function selectAll(cb){
  products.forEach(p=>p.selected=cb.checked);
  renderList();
}

function updateSelCount(){
  const n=products.filter(p=>p.selected).length;
  document.getElementById('sel-count').textContent=n+'개 선택';
}

function toggleAdjust(){
  adjVisible=!adjVisible;
  document.getElementById('adjust-panel').style.display=adjVisible?'block':'none';
  document.getElementById('adj-toggle').textContent=adjVisible?'닫기':'가격 조정';
}

function applyAdjust(){
  const type=document.getElementById('adj-type').value;
  const val=parseFloat(document.getElementById('adj-val').value);
  if(!val||isNaN(val)){showToast('조정값을 입력하세요');return;}
  const targets=products.filter(p=>p.selected);
  if(!targets.length){showToast('제품을 먼저 선택하세요');return;}
  showToast('처리 중...');
  let done=0;
  targets.forEach(p=>{
    let np=Number(p.price);
    if(type==='pct-up')np=Math.round(np*(1+val/100));
    else if(type==='pct-down')np=Math.round(np*(1-val/100));
    else if(type==='fixed-up')np=np+val;
    else np=Math.max(0,np-val);
    api({action:'update',id:p.id,price:np}).then(d=>{
      if(d.status==='ok')p.price=np;
      done++;
      if(done===targets.length){renderList();showToast('✓ '+targets.length+'개 가격 조정 완료');}
    });
  });
}

function addProduct(){
  const model=document.getElementById('inp-model').value.trim();
  const sku=document.getElementById('inp-sku').value.trim();
  const price=document.getElementById('inp-price').value;
  const note=document.getElementById('inp-note').value.trim();
  const img=document.getElementById('inp-img').value.trim();
  if(!model){showToast('모델번호를 입력하세요');return;}
  if(!sku){showToast('관리번호를 입력하세요');return;}
  if(!price){showToast('가격을 입력하세요');return;}
  const btn=document.getElementById('btn-add');
  btn.textContent='등록 중...';btn.disabled=true;
  api({action:'add',model,sku,price,note,img}).then(data=>{
    btn.textContent='제품 등록하기';btn.disabled=false;
    if(data.status==='ok'){
      showToast('✓ 등록 완료: '+model);
      ['inp-model','inp-sku','inp-price','inp-note','inp-img'].forEach(id=>document.getElementById(id).value='');
    } else {
      showToast('오류: '+(data.message||'등록 실패'));
    }
  }).catch(()=>{btn.textContent='제품 등록하기';btn.disabled=false;showToast('등록 실패. 다시 시도해 주세요.');});
}

function openDetail(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  document.getElementById('modal-title').textContent=p.model;
  document.getElementById('modal-body').innerHTML=`
    ${p.img?`<img src="${p.img}" style="width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:12px" onerror="this.style.display='none'" alt="">`:''}
    <div class="detail-row"><span class="lbl">모델번호</span><span class="val">${p.model}</span></div>
    <div class="detail-row"><span class="lbl">관리번호 (내부)</span><span class="val sku-val">${p.sku}</span></div>
    <div class="detail-row"><span class="lbl">판매가</span><span class="val price-val">₩${Number(p.price).toLocaleString()}</span></div>
    <div class="detail-row"><span class="lbl">업데이트</span><span class="val">${p.updated}</span></div>
    ${p.note?`<div style="margin-top:10px;font-size:13px;color:#6B6560;line-height:1.6;padding-bottom:8px;border-bottom:1px solid var(--border)">${p.note}</div>`:''}
    <div class="barcode-area" onclick="showToast('바코드 생성 기능 — 추후 지원 예정')">
      <div class="barcode-lines">▌▐▌▌▐▐▌▐▌▌▐▌▐▐▌▌▐▌▐</div>
      <div class="barcode-label">바코드 생성 (준비 중)</div>
    </div>
    <div class="modal-actions">
      <button onclick="editPrice('${p.id}')">가격 수정</button>
      <button onclick="editNote('${p.id}')">메모 수정</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function editPrice(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const val=prompt('새 가격을 입력하세요\n현재: ₩'+Number(p.price).toLocaleString(),p.price);
  if(val===null)return;
  const n=parseFloat(val);
  if(isNaN(n)||n<0){showToast('올바른 가격을 입력하세요');return;}
  api({action:'update',id:p.id,price:n}).then(d=>{
    if(d.status==='ok'){p.price=n;closeModal();renderList();showToast('✓ 가격 수정 완료');}
  });
}

function editNote(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const val=prompt('특이사항을 입력하세요',p.note||'');
  if(val===null)return;
  api({action:'update',id:p.id,note:val}).then(d=>{
    if(d.status==='ok'){p.note=val;closeModal();renderList();showToast('✓ 메모 수정 완료');}
  });
}

function deleteProduct(id){
  if(!confirm('이 제품을 삭제할까요?'))return;
  api({action:'delete',id}).then(d=>{
    if(d.status==='ok'){products=products.filter(x=>x.id!==id);renderList();showToast('✓ 삭제 완료');}
  });
}

function closeModal(){document.getElementById('modal').classList.remove('open')}

function doLookup(){
  const q=document.getElementById('lookup-inp').value.trim();
  const el=document.getElementById('lookup-result');
  if(!q){el.innerHTML='';return;}
  el.innerHTML='<div class="loading-state">조회 중...</div>';
  api({action:'lookup',model:q}).then(data=>{
    if(data.status==='ok'){
      const p=data.data;
      el.innerHTML=`
        <div class="result-card">
          <div class="result-img">${p.img?`<img src="${p.img}" alt="" onerror="this.parentElement.innerHTML='💍'">`:'💍'}</div>
          <div class="result-body">
            <div class="result-model">${p.model}</div>
            <div class="result-price">₩${Number(p.price).toLocaleString()}</div>
            ${p.note?`<div class="result-note">${p.note}</div>`:''}
            <div class="result-updated">업데이트: ${p.updated}</div>
          </div>
        </div>`;
    } else {
      el.innerHTML=`<div class="not-found">💍 "${q}" — 해당 모델을 찾을 수 없습니다</div>`;
    }
  }).catch(()=>{el.innerHTML='<div class="not-found">조회 실패. 다시 시도해 주세요.</div>';});
}

function renderRecent(){
  const el=document.getElementById('recent-list');
  const recent=products.slice(0,4);
  if(!recent.length){el.innerHTML='<div style="font-size:13px;color:var(--text2)">등록된 제품이 없습니다</div>';return;}
  el.innerHTML=recent.map(p=>`
    <div class="product-item" onclick="document.getElementById('lookup-inp').value='${p.model}';doLookup()" style="cursor:pointer">
      <div class="p-thumb">${p.img?`<img src="${p.img}" alt="" onerror="this.parentElement.innerHTML='💍'">`:'💍'}</div>
      <div class="p-info">
        <div class="p-model">${p.model}</div>
        <div class="p-price">₩${Number(p.price).toLocaleString()}</div>
      </div>
    </div>
  `).join('');
}

// 저장된 설정 있으면 바로 메인으로
if(cfg.url&&cfg.key){
  document.getElementById('setup-screen').style.display='none';
  const ms=document.getElementById('main-screen');
  ms.style.display='flex';ms.style.flexDirection='column';
  loadProducts();
}
</script>
</body>
</html>
